<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline — Restro OS</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }
    .card {
      max-width: 24rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #fff; }
    p { color: #94a3b8; margin-bottom: 1.5rem; }
    .retry { color: #f97316; cursor: pointer; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>You're offline</h1>
    <p>Restro OS needs a connection to load the menu and place orders. Check your network and try again.</p>
    <p><span class="retry" onclick="window.location.reload()">Retry</span></p>
  </div>
</body>
</html>
